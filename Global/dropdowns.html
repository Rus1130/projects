<head>
    <script src="./dropdowns.js"></script>
</head>
<body>
    <div id="dropdown"></div>
</body>
<script>
    const dropdown = new Dropdown(document.getElementById('dropdown'), [
        {label: 'Option 1', value: 1, key: 'opt1'},
        {label: 'Option 2', value: 2, key: 'opt2'},
        {label: 'Option 3', value: 3, key: 'opt3'},
    ], {
        defaultText: 'Select an option',
    })


    dropdown.addEventListener("optionchange", (e) => {
        console.log(dropdown.selected());
    });
</script>
