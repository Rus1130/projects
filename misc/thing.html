<body>
  <div id="root"></div>
</body>
<script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165/build/three.module.js";

    const windowWidth = window.innerWidth;
    const windowHeight = window.innerHeight;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    // renderer (full screen)
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.style.margin = 0;
    document.body.appendChild(renderer.domElement);

    // orthographic camera (1 unit = 1 pixel)
    const camera = new THREE.OrthographicCamera(
        window.innerWidth / -2,
        window.innerWidth / 2,
        window.innerHeight / 2,
        window.innerHeight / -2,
        0.1,
        1000
    );

    camera.position.z = 10;

    const GRAVITY = -0.9;

    class Ball {
        constructor(radius) {
            this.radius = radius;

            const geometry = new THREE.CircleGeometry(radius, 40);
            const material = new THREE.MeshBasicMaterial({
                color: 0xff0000
            });

            this.mesh = new THREE.Mesh(geometry, material);

            // velocity
            this.velocity = {
                x: 0.5,
                y: 0.5
            };

            // acceleration (NEW)
            this.acceleration = {
                x: 0,
                y: 0
            };

            const halfW = windowWidth / 2;
            const halfH = windowHeight / 2;

            this.mesh.position.x =
                Math.random() * (windowWidth - radius * 2) - halfW + radius;

            this.mesh.position.y =
                Math.random() * (windowHeight - radius * 2) - halfH + radius;

            scene.add(this.mesh);
        }

        update() {


            this.acceleration.y = GRAVITY;

            // velocity += acceleration
            this.velocity.x += this.acceleration.x;
            this.velocity.y += this.acceleration.y;

            // position += velocity
            this.mesh.position.x += this.velocity.x;
            this.mesh.position.y += this.velocity.y;

            const halfW = windowWidth / 2;
            const halfH = windowHeight / 2;

            // bounce X
            if (
                this.mesh.position.x > halfW - this.radius ||
                this.mesh.position.x < -halfW + this.radius
            ) {
                this.velocity.x *= -1;
            }

            // bounce Y
            if (
                this.mesh.position.y > halfH - this.radius ||
                this.mesh.position.y < -halfH + this.radius
            ) {
                this.velocity.y *= -1;
            }
        }
    }


    class Simulation {
        constructor(ballCount, ballSize) {
            this.objects = [];
            for(let i = 0; i < ballCount; i++) {
                this.objects.push(new Ball(ballSize));
            }
        }

        update() {
            this.objects.forEach(obj => obj.update());
        }
    }

    
    const sim = new Simulation(150, 10);

    let paused = false;

    function animate() {
        requestAnimationFrame(animate);

        if (!paused) {
            sim.update();
        }

        renderer.render(scene, camera);
    }

    animate();


    window.addEventListener("keydown", (e) => {
        if(e.code === "Space") {
            paused = !paused;
        }
    });

</script>
